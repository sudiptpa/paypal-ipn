name: ci

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: ${{ matrix.php == '8.2' && 'xdebug' || 'none' }}
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Lint
        run: composer lint

      - name: Static analysis
        run: composer stan

      - name: Unit tests
        run: composer test

      - name: Coverage report
        if: matrix.php == '8.2'
        run: vendor/bin/phpunit --configuration=phpunit.xml.dist --coverage-clover build/coverage/clover.xml --coverage-text

      - name: Upload coverage artifact
        if: matrix.php == '8.2'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-clover
          path: build/coverage/clover.xml
